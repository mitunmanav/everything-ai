documentation:
  - changed-files:
      - any-glob-to-any-file: ["**/*.md"]

github_actions:
  - changed-files:
      - any-glob-to-any-file: [".github/**"]

dependencies:
  - changed-files:
      - any-glob-to-any-file: ["package.json", "package-lock.json"]

test:
  - changed-files:
      - any-glob-to-any-file: ["tests/**"]

scripts:
  - changed-files:
      - any-glob-to-any-file: ["scripts/**"]
