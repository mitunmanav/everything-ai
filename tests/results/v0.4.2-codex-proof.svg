  <text x="60" y="360" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" fill="#c9d1d9">per-metric skill delta</text>
  <text x="60" y="378" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#6e7681">Skill-on minus skill-off, as percent of metric max. Higher is better.</text>

  <text x="50" y="414" text-anchor="end" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#8b949e">+80%</text>
