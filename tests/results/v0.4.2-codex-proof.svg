<svg xmlns="http://www.w3.org/2000/svg" width="900" height="680" viewBox="0 0 900 680" role="img" aria-labelledby="title desc">
  <title id="title">Everything AI v0.4.2 two-model test report</title>
  <desc id="desc">Two-model blind benchmark report from Codex CLI. GPT-5.5 medium reasoning improved from 52.6 to 96.1 percent, plus 43.5 points. GPT-5.4-mini low improved from 52.6 to 89.5 percent, plus 36.9 points. Both models completed 40 raw outputs. The per-metric skill delta is shown for ask-gate, scope, safe-defaults, risk-stop, proof-report, memory, and trace-complete. Known GPT-5.5 partials were EAI-005 and EAI-007.</desc>

  <rect width="900" height="680" fill="#0d1117"/>
  <text x="450" y="30" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#f0f6fc">Everything AI v0.4.2 - two-model proof</text>
  <text x="450" y="54" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" fill="#56d364">gpt-5.5 +43.5 pts  |  gpt-5.4-mini +36.9 pts  |  80/80 outputs</text>
  <text x="450" y="74" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#8b949e">20 scenarios per model - skill off + skill on - blind gpt-5.5 medium judge</text>

  <rect x="290" y="88" width="11" height="11" rx="2" fill="#2da44e"/>
  <text x="306" y="98" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#8b949e">gpt-5.5 medium</text>
  <rect x="430" y="88" width="11" height="11" rx="2" fill="#2f81f7"/>
  <text x="446" y="98" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#8b949e">gpt-5.4-mini low reasoning</text>

  <text x="60" y="130" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" fill="#c9d1d9">Overall score</text>
  <text x="60" y="148" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#6e7681">Gray = skill off. Color = skill on. Same rubric max: 76 points.</text>

  <text x="60" y="187" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#c9d1d9">gpt-5.5</text>
  <rect x="180" y="166" width="500" height="24" rx="5" fill="#21262d"/>
  <rect x="180" y="166" width="263" height="24" rx="5" fill="#8b949e"/>
  <text x="692" y="184" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#c9d1d9">off 52.6%</text>
  <rect x="180" y="198" width="500" height="24" rx="5" fill="#21262d"/>
  <rect x="180" y="198" width="481" height="24" rx="5" fill="#2da44e"/>
  <text x="692" y="216" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" fill="#56d364">on 96.1%</text>
  <text x="810" y="201" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="700" fill="#56d364">+43.5 pts overall</text>

  <text x="60" y="267" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#c9d1d9">gpt-5.4-mini</text>
  <rect x="180" y="246" width="500" height="24" rx="5" fill="#21262d"/>
  <rect x="180" y="246" width="263" height="24" rx="5" fill="#8b949e"/>
  <text x="692" y="264" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#c9d1d9">off 52.6%</text>
  <rect x="180" y="278" width="500" height="24" rx="5" fill="#21262d"/>
  <rect x="180" y="278" width="448" height="24" rx="5" fill="#2f81f7"/>
  <text x="692" y="296" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" fill="#58a6ff">on 89.5%</text>
  <text x="810" y="281" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="700" fill="#58a6ff">+36.9 pts</text>

