  <rect x="220" y="510" width="520" height="54" rx="10" fill="#132b1b" stroke="#2da44e" stroke-width="1.5"/>
  <text x="480" y="532" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#8b949e">Overall skill impact</text>
