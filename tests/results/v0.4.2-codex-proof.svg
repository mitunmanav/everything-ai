<svg xmlns="http://www.w3.org/2000/svg" width="900" height="680" viewBox="0 0 900 680" role="img" aria-labelledby="title desc">
  <title id="title">Everything AI v0.4.2 two-model, two-judge proof</title>
  <desc id="desc">Claude Sonnet 5 and Codex gpt-5.5 independently scored the same blinded outputs. Claude scored gpt-5.5 medium reasoning from 47.4 to 96.1 percent, plus 48.7 points, and gpt-5.4-mini low reasoning from 46.1 to 86.8 percent, plus 40.7 points. Codex scored the same outputs from 52.6 to 96.1 percent, plus 43.5 points, and from 52.6 to 89.5 percent, plus 36.9 points.</desc>

  <rect width="900" height="680" fill="#0d1117"/>
  <text x="450" y="32" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#f0f6fc">Everything AI v0.4.2 - two-model, two-judge proof</text>
  <text x="450" y="56" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" fill="#56d364">Both blind judges score skill-on much higher</text>
  <text x="450" y="76" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#8b949e">20 scenarios per model - skill off + on - 40 raw outputs per model</text>

  <rect x="310" y="90" width="11" height="11" rx="2" fill="#8b949e"/>
  <text x="326" y="100" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#8b949e">skill off</text>
  <rect x="410" y="90" width="11" height="11" rx="2" fill="#2da44e"/>
  <text x="426" y="100" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#8b949e">skill on</text>

  <rect x="40" y="116" width="820" height="218" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="60" y="142" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" fill="#f0f6fc">Claude Sonnet 5 blind judge</text>

  <text x="60" y="170" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="600" fill="#c9d1d9">gpt-5.5 - medium reasoning</text>
  <rect x="240" y="154" width="500" height="20" rx="4" fill="#21262d"/>
  <rect x="240" y="154" width="237" height="20" rx="4" fill="#8b949e"/>
  <text x="748" y="169" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#c9d1d9">off 47.4%</text>
  <rect x="240" y="182" width="500" height="20" rx="4" fill="#21262d"/>
  <rect x="240" y="182" width="481" height="20" rx="4" fill="#2da44e"/>
  <text x="748" y="197" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" fill="#56d364">on 96.1%</text>
  <text x="818" y="188" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" fill="#56d364">+48.7 pts overall</text>

  <text x="60" y="256" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="600" fill="#c9d1d9">gpt-5.4-mini - low reasoning</text>
  <rect x="240" y="240" width="500" height="20" rx="4" fill="#21262d"/>
  <rect x="240" y="240" width="231" height="20" rx="4" fill="#8b949e"/>
  <text x="748" y="255" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#c9d1d9">off 46.1%</text>
  <rect x="240" y="268" width="500" height="20" rx="4" fill="#21262d"/>
  <rect x="240" y="268" width="434" height="20" rx="4" fill="#2f81f7"/>
  <text x="748" y="283" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" fill="#58a6ff">on 86.8%</text>
  <text x="818" y="274" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" fill="#58a6ff">+40.7 pts overall</text>

  <rect x="40" y="350" width="820" height="218" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="60" y="376" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" fill="#f0f6fc">Codex gpt-5.5 blind judge</text>

  <text x="60" y="404" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="600" fill="#c9d1d9">gpt-5.5 - medium reasoning</text>
  <rect x="240" y="388" width="500" height="20" rx="4" fill="#21262d"/>
  <rect x="240" y="388" width="263" height="20" rx="4" fill="#8b949e"/>
  <text x="748" y="403" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#c9d1d9">off 52.6%</text>
  <rect x="240" y="416" width="500" height="20" rx="4" fill="#21262d"/>
  <rect x="240" y="416" width="481" height="20" rx="4" fill="#2da44e"/>
  <text x="748" y="431" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" fill="#56d364">on 96.1%</text>
  <text x="818" y="422" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" fill="#56d364">+43.5 pts overall</text>

  <text x="60" y="490" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="600" fill="#c9d1d9">gpt-5.4-mini - low reasoning</text>
  <rect x="240" y="474" width="500" height="20" rx="4" fill="#21262d"/>
  <rect x="240" y="474" width="263" height="20" rx="4" fill="#8b949e"/>
  <text x="748" y="489" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#c9d1d9">off 52.6%</text>
  <rect x="240" y="502" width="500" height="20" rx="4" fill="#21262d"/>
  <rect x="240" y="502" width="448" height="20" rx="4" fill="#2f81f7"/>
  <text x="748" y="517" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" fill="#58a6ff">on 89.5%</text>
  <text x="818" y="508" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" fill="#58a6ff">+36.9 pts</text>

  <text x="450" y="604" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#8b949e">Same current outputs and rubric. Arm identity joined only after each judge saved scores.</text>
  <text x="450" y="628" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" fill="#d29922">Single-run current-harness result - not comparable with v0.4.0 as release-to-release improvement.</text>
  <text x="450" y="652" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#6e7681">Aggregated scores public. Raw model transcripts kept local because they can contain machine paths.</text>
</svg>
