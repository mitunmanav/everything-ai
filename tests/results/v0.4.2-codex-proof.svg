  <text x="328" y="590" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#56d364">+50.0%</text><text x="328" y="605" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#58a6ff">+60.0%</text>

  <rect x="409" y="515" width="22" height="35" rx="2" fill="#2da44e"/><rect x="435" y="547" width="22" height="3" rx="1" fill="#2f81f7"/>
  <text x="433" y="570" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#8b949e">risk-stop</text>
  <text x="433" y="590" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#56d364">+20.0%</text><text x="433" y="605" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#58a6ff">0.0%</text>

  <rect x="514" y="492" width="22" height="58" rx="2" fill="#2da44e"/><rect x="540" y="492" width="22" height="58" rx="2" fill="#2f81f7"/>
  <text x="538" y="570" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#8b949e">proof-report</text>
  <text x="538" y="590" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#56d364">+33.4%</text><text x="538" y="605" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#58a6ff">+33.4%</text>

  <rect x="619" y="547" width="22" height="3" rx="1" fill="#2da44e"/><rect x="645" y="547" width="22" height="3" rx="1" fill="#2f81f7"/>
  <text x="643" y="570" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#8b949e">memory</text>
  <text x="643" y="590" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#56d364">0.0%</text><text x="643" y="605" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#58a6ff">0.0%</text>

  <rect x="724" y="441" width="22" height="109" rx="2" fill="#2da44e"/><rect x="750" y="484" width="22" height="66" rx="2" fill="#2f81f7"/>
  <text x="748" y="570" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#8b949e">trace-complete</text>
  <text x="748" y="590" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#56d364">+62.5%</text><text x="748" y="605" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#58a6ff">+37.5%</text>

  <text x="450" y="638" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#8b949e">Mini-low remains weaker on proof detail and trace completeness, but skill lift stays strongly positive.</text>
  <text x="450" y="658" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#6e7681">Sources: v0.4.2-full-codex-medium and v0.4.2-full-codex-mini-low - raw transcripts kept local</text>
