  <text x="765" y="160" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10.5" font-weight="700" fill="#56d364">+62.5%</text>
  <text x="765" y="277" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9.5" fill="#8b949e">trace-complete</text>

  <text x="450" y="307" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9.5" fill="#6e7681">Largest gains: scope +75.0%, trace-complete +62.5%, safe-defaults +50.0%</text>
  <line x1="70" y1="326" x2="830" y2="326" stroke="#21262d" stroke-width="2"/>

