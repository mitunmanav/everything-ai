  <text x="223" y="590" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#56d364">+75.0%</text><text x="223" y="605" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#58a6ff">+62.5%</text>

