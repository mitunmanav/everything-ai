<svg xmlns="http://www.w3.org/2000/svg" width="900" height="625" viewBox="0 0 900 625" role="img" aria-labelledby="chart-title chart-desc">
  <title id="chart-title">Everything AI v0.4.2 full Codex test report</title>
  <desc id="chart-desc">Two charts based on the v0.4.2 full Codex blind judge. Chart one shows per-metric skill delta as percent of metric max: ask-gate plus 33.4 percent, scope plus 75 percent, safe-defaults plus 50 percent, risk-stop plus 20 percent, proof-report plus 33.4 percent, memory zero percent, and trace-complete plus 62.5 percent. Chart two shows skill off 52.6 percent and skill on 96.1 percent, an improvement of 43.5 points. The test used Codex CLI, gpt-5.5 medium reasoning, 20 scenarios, and 40 raw outputs. Known partials were EAI-005 and EAI-007.</desc>

  <rect width="900" height="625" fill="#0d1117"/>

  <text x="450" y="30" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="17" font-weight="700" fill="#f0f6fc">Everything AI - v0.4.2 full Codex test report</text>
  <text x="450" y="52" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e">Codex CLI - gpt-5.5 - medium reasoning - blind judge - 20 scenarios - 40 raw outputs</text>

  <rect x="318" y="65" width="11" height="11" rx="2" fill="#2da44e"/>
  <text x="334" y="75" font-family="Segoe UI,Arial,sans-serif" font-size="10.5" fill="#8b949e">skill helps</text>
  <rect x="425" y="65" width="11" height="11" rx="2" fill="#6e7681"/>
  <text x="441" y="75" font-family="Segoe UI,Arial,sans-serif" font-size="10.5" fill="#8b949e">no change</text>

  <text x="70" y="104" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" fill="#c9d1d9">Per-metric skill delta</text>
  <text x="70" y="121" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#6e7681">Bars show skill-on minus skill-off as percent of metric max (0-2 scale)</text>

  <text x="62" y="147" text-anchor="end" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#8b949e">+80%</text>
