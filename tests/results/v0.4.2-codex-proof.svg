  <text x="450" y="588" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#8b949e">Known skill-on partials: EAI-005 paid-tool proof trace - EAI-007 architecture scope map</text>
  <text x="450" y="607" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9.5" fill="#6e7681">Source: v0.4.2-full-codex-medium/codex_judge_summary.json - extra Codex proof; historical judge method unchanged</text>
