  <text x="50" y="519" text-anchor="end" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#8b949e">+20%</text>
  <line x1="60" y1="515" x2="840" y2="515" stroke="#30363d" stroke-dasharray="4 3"/>
  <text x="50" y="554" text-anchor="end" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#8b949e">0%</text>
  <line x1="60" y1="550" x2="840" y2="550" stroke="#6e7681" stroke-width="1.5"/>

  <rect x="94" y="492" width="22" height="58" rx="2" fill="#2da44e"/><rect x="120" y="477" width="22" height="73" rx="2" fill="#2f81f7"/>
  <text x="118" y="570" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#8b949e">ask-gate</text>
  <text x="118" y="590" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#56d364">+33.4%</text><text x="118" y="605" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#58a6ff">+41.7%</text>

