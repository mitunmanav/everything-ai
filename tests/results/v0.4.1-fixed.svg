<svg xmlns="http://www.w3.org/2000/svg" width="900" height="590" viewBox="0 0 900 590" role="img" aria-labelledby="chart-title chart-desc">
<title id="chart-title">Everything AI v0.4.1 — skill impact and regression fix</title>
<desc id="chart-desc">Two charts. Chart one: gpt-5.5 medium reasoning per-metric skill delta in percent of metric max (v0.4.0 baseline unchanged in v0.4.1). Seven metrics: ask-gate plus 8%, scope minus 13%, safe-defaults minus 10%, risk-stop 0%, proof-report plus 6%, memory 0%, trace-complete plus 19%. Overall off 88.2% on 92.1% delta plus 3.9 pts. Chart two: gpt-5.4-mini low reasoning overall skill delta before and after fix. v0.4.0 bugged PLUGIN_DATA minus 10.5 pts. v0.4.1 fixed plus 2.6 pts. gpt-5.5 reference plus 3.9 shown. v0.4.1 retested on mini only. First v0.4.1 run failed transiently; second run produced these results.</desc>

<!-- ─── background ─── -->
<rect width="900" height="590" fill="#0d1117"/>

<!-- ─── title ─── -->
<text x="450" y="27" text-anchor="middle"
      font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
      font-size="16" font-weight="700" fill="#c9d1d9">
  Everything AI · v0.4.1 — skill impact &amp; regression fix confirmed
</text>

<!-- ─── legend ─── -->
<rect x="178" y="40" width="11" height="11" fill="#2da44e" rx="2"/>
<text x="193" y="50" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10.5" fill="#8b949e">skill helps</text>
<rect x="290" y="40" width="11" height="11" fill="#cf222e" rx="2"/>
<text x="305" y="50" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10.5" fill="#8b949e">skill hurts</text>
<rect x="400" y="40" width="11" height="11" fill="#6e7681" rx="2"/>
<text x="415" y="50" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10.5" fill="#8b949e">no change</text>
<rect x="525" y="40" width="11" height="11" fill="#e3a008" rx="2"/>
<text x="540" y="50" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10.5" fill="#8b949e">PLUGIN_DATA bug (v0.4.0)</text>

