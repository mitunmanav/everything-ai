<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
<title id="title">Everything AI release history and current status</title>
<desc id="desc">Timeline of measured results. v0.3.0 had plus 6 saved-output lift. v0.4.0 live run on gpt-5.5 had plus 3.9 and gpt-5.4-mini had minus 10.5 due to PLUGIN_DATA bug. v0.4.1 fixed mini to plus 2.6. v0.4.2 has no live benchmark yet and shows only unit tests 44 of 44 passing.</desc>
