<svg xmlns="http://www.w3.org/2000/svg" width="880" height="648" viewBox="0 0 880 648" role="img" aria-labelledby="t d">
<title id="t">Everything AI v0.4.1 — PLUGIN_DATA regression: scope and defaults drop when memory hook is silenced</title>
<desc id="d">Blind cross-model judge. Bars show the change the skill makes per metric, on minus off, in points of rubric max. Amber dashed boxes mark the two metrics that regressed due to the PLUGIN_DATA bug in v0.4.0: scope_inference and safe_defaults. gpt-5.5 medium: overall 3.9 pts — ask-gate +8, scope -12, defaults -10, risk-stop +0, proof +6, memory +0, complete +19. gpt-5.4-mini low: overall -10.5 pts — ask-gate -8, scope -12, defaults -10, risk-stop +0, proof -17, memory +0, complete -12. The PLUGIN_DATA bug silenced context injection on every prompt. Fixed in v0.4.1: removed PLUGIN_DATA branch, added Safe Defaults to SKILL.md. Retest pending.</desc>
<rect width="880" height="648" fill="#0d1117"/>
<text x="440.0" y="26" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#c9d1d9">Everything AI · Root Cause Analysis — v0.4.0 regression / v0.4.1 fix</text>
<text x="440.0" y="46" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#8b949e">Bars = with-skill minus without-skill, points of rubric max · green helps · red hurts · amber = PLUGIN_DATA bug · n=20 per model</text>
<rect x="70" y="80" width="740" height="100" fill="#161b22" stroke="#58a6ff" stroke-width="1" rx="5"/>
<text x="84" y="106" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10.5" fill="#8b949e">Root cause (v0.4.0):  PLUGIN_DATA env var hijacked the memory hook.</text>
<text x="84" y="124" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10.5" fill="#8b949e">Hook read plugin install dir → found no memory files → zero context injected.</text>
<text x="84" y="142" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10.5" fill="#58a6ff">Fix (v0.4.1):  removed PLUGIN_DATA branch from context_inject.py.</text>
<text x="84" y="160" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10.5" fill="#58a6ff">Also added ## Safe Defaults to SKILL.md — replaced vague 'use general defaults'.</text>
