<svg xmlns="http://www.w3.org/2000/svg" width="880" height="580" viewBox="0 0 880 580" role="img" aria-labelledby="t d">
<title id="t">Everything AI v0.4.0 — what the skill changes, per metric</title>
<desc id="d">Blind cross-model judge. Bars show the change the skill makes per metric, on minus off, in points of the rubric max: green above the zero line where it helps, red below where it hurts. Top panel gpt-5.5 at medium reasoning is mostly green, overall 3.9 points, led by trace completeness and ask-gating, with small drops on scope and defaults. Bottom panel gpt-5.4-mini at low reasoning is all red, overall -10.5 points: the same instructions overload a small model. The skill helps a capable model and hurts a small one.</desc>
<rect width="880" height="580" fill="#0d1117"/>
