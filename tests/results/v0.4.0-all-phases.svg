<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560" role="img" aria-labelledby="t d">
<title id="t">Everything AI v0.4.0 — behavior quality, with vs without the skill</title>
<desc id="d">Blind cross-model judge, score as percent of the rubric max, higher is better. Top panel gpt-5.5 at medium reasoning: without skill 88.2 percent, with skill 92.1 percent, a 3.9 point gain, with the biggest lift on trace completeness and ask-gating. Bottom panel gpt-5.4-mini at low reasoning: without skill 75.0 percent, with skill 64.5 percent, a -10.5 point drop, every metric lower. The skill helps a capable model and overloads a small one.</desc>
