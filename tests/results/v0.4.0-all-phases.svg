<text x="440.0" y="50" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11.5" fill="#8b949e">Bars = with-skill minus without-skill, in points of rubric max · above 0 the skill helps, below 0 it hurts · n=20 scored runs per model</text>
