<svg xmlns="http://www.w3.org/2000/svg" width="860" height="480" viewBox="0 0 860 480" role="img" aria-labelledby="title desc">
  <title id="title">Everything AI v0.3.0 — behavior lift</title>
  <desc id="desc">Two panels showing behavior score (with skill 20/20, without 14/20, delta +6) and token estimate (with 320, without 210, delta +110).</desc>

  <rect width="860" height="480" fill="#ffffff"/>

  <!-- Title -->
  <text x="430" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Everything AI v0.3.0 — behavior lift</text>
  <text x="430" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">gpt-5.5, medium reasoning · 10-scenario saved-output scorecard</text>

  <!-- Panel divider -->
  <line x1="430" y1="80" x2="430" y2="400" stroke="#f1f5f9" stroke-width="1.5"/>

  <!-- ── LEFT PANEL: Behavior score ── -->
  <text x="215" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#0f172a">Behavior score</text>
  <text x="215" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">max 20</text>

  <line x1="80" y1="130" x2="80" y2="360" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="80" y1="360" x2="370" y2="360" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="80" y1="245" x2="370" y2="245" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="80" y1="130" x2="370" y2="130" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="68" y="364" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#64748b">0</text>
  <text x="68" y="249" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#64748b">10</text>
  <text x="68" y="134" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#64748b">20</text>

  <!-- Without: 14/20 * 230 = 161.5px, top = 360-161 = 199 -->
  <rect x="130" y="199" width="60" height="161" fill="#94a3b8" rx="4"/>
  <text x="160" y="191" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#475569">14</text>
  <text x="160" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">Without</text>

  <!-- With: 20/20 * 230 = 230px, top = 130 -->
  <rect x="230" y="130" width="60" height="230" fill="#10b981" rx="4"/>
  <text x="260" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#10b981">20</text>
  <text x="260" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#10b981">With</text>

  <text x="328" y="158" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#f59e0b">+6</text>

  <!-- ── RIGHT PANEL: Token estimate ── -->
  <text x="645" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#0f172a">Output token estimate</text>
  <text x="645" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">word/punctuation split · not API billing</text>

  <line x1="510" y1="130" x2="510" y2="360" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="510" y1="360" x2="800" y2="360" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="510" y1="283" x2="800" y2="283" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="510" y1="207" x2="800" y2="207" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="510" y1="130" x2="800" y2="130" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Y ticks: 0=360, 100=283, 200=207, 300=130 (77px per 100) -->
  <text x="498" y="364" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#64748b">0</text>
  <text x="498" y="287" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#64748b">100</text>
  <text x="498" y="211" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#64748b">200</text>
  <text x="498" y="134" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#64748b">300</text>

  <!-- Without: 210/300 * 230 = 161px, top = 360-161 = 199 -->
  <rect x="560" y="199" width="60" height="161" fill="#94a3b8" rx="4"/>
  <text x="590" y="191" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#475569">210</text>
  <text x="590" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">Without</text>

  <!-- With: 320 capped at 300 → 230px full height, top = 130 -->
  <rect x="660" y="130" width="60" height="230" fill="#6366f1" rx="4"/>
  <text x="690" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#6366f1">320</text>
  <text x="690" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6366f1">With</text>

  <text x="742" y="158" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#f59e0b">+110</text>

  <!-- Footer -->
  <rect x="100" y="415" width="660" height="36" fill="#f8fafc" rx="8" stroke="#e2e8f0" stroke-width="1"/>
  <text x="430" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Skill static budget: 956 tokens · Raw result: tests/results/v0.3.0-with-vs-without-skill.json</text>
</svg>
